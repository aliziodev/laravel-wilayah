name: Sync Upstream Data

on:
  schedule:
    - cron: '0 2 * * *'   # Setiap hari jam 02:00 UTC
  workflow_dispatch:        # Bisa trigger manual dari GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout package repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: curl

      - name: Cek hash upstream via GitHub API
        id: check
        run: |
          # wilayah → branch: master
          WILAYAH_HASH=$(curl -sf \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/cahyadsn/wilayah/commits/master" \
            | php -r '$data = json_decode(stream_get_contents(STDIN), true); echo $data["sha"] ?? "null";')

          # wilayah_kodepos → branch: main (beda!)
          KODEPOS_HASH=$(curl -sf \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/cahyadsn/wilayah_kodepos/commits/main" \
            | php -r '$data = json_decode(stream_get_contents(STDIN), true); echo $data["sha"] ?? "null";')

          # Gabungkan kedua hash sebagai fingerprint
          UPSTREAM_HASH="${WILAYAH_HASH:0:12}-${KODEPOS_HASH:0:12}"

          # Baca fingerprint yang tersimpan di package
          CURRENT_HASH=$(php -r "
            \$v = @include 'data/version.php';
            echo \$v['source_hash'] ?? 'none';
          ")

          echo "upstream_hash=$UPSTREAM_HASH" >> $GITHUB_OUTPUT
          echo "current_hash=$CURRENT_HASH"   >> $GITHUB_OUTPUT

          if [ "$WILAYAH_HASH" = "null" ] || [ "$KODEPOS_HASH" = "null" ]; then
            echo "Gagal membaca hash upstream dari GitHub API."
            exit 1
          fi

          if [ "$UPSTREAM_HASH" != "$CURRENT_HASH" ]; then
            echo "changed=true"  >> $GITHUB_OUTPUT
            echo "📦 Ada perubahan: $CURRENT_HASH → $UPSTREAM_HASH"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "✅ Data sudah up-to-date."
          fi

      - name: Set release metadata
        if: steps.check.outputs.changed == 'true'
        id: meta
        run: |
          cp data/version.php /tmp/wilayah-version-before.php 2>/dev/null || true
          echo "release_date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Jalankan Normalizer (fetch raw SQL dari GitHub)
        if: steps.check.outputs.changed == 'true'
        run: |
          # URL dengan refs/heads/ agar eksplisit dan tidak ambigu
          php .github/scripts/normalize.php \
            "https://raw.githubusercontent.com/cahyadsn/wilayah/refs/heads/master/db/wilayah.sql" \
            "https://raw.githubusercontent.com/cahyadsn/wilayah_kodepos/refs/heads/main/db/wilayah_kodepos.sql"

      - name: Bump versi package
        if: steps.check.outputs.changed == 'true'
        id: version
        run: |
          CURRENT=$(php -r "
            \$c = json_decode(file_get_contents('composer.json'), true);
            echo \$c['version'] ?? '1.0.0';
          ")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          echo "current_version=$CURRENT" >> $GITHUB_OUTPUT
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

          php -r "
            \$c = json_decode(file_get_contents('composer.json'), true);
            \$c['version'] = '$NEW_VERSION';
            file_put_contents('composer.json', json_encode(\$c, JSON_PRETTY_PRINT | JSON_UNESCAPED_SLASHES) . PHP_EOL);
          "
          echo "✅ Version bumped: $CURRENT → $NEW_VERSION"

      - name: Generate changelog and release notes
        if: steps.check.outputs.changed == 'true'
        run: |
          php .github/scripts/generate_changelog.php \
            /tmp/wilayah-version-before.php \
            data/version.php \
            CHANGELOG.md \
            .github/release-notes.md \
            "${{ steps.version.outputs.current_version }}" \
            "${{ steps.version.outputs.new_version }}"

      - name: Commit & Push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ composer.json CHANGELOG.md
          git commit -m "data: sync upstream $(date +%Y-%m-%d) [skip ci]

          Source: cahyadsn/wilayah@${{ steps.check.outputs.upstream_hash }}"
          git push

      - name: Buat GitHub Release
        if: steps.check.outputs.changed == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.new_version }}
          name: "v${{ steps.version.outputs.new_version }} - Sync ${{ steps.meta.outputs.release_date }}"
          body_path: .github/release-notes.md
          generate_release_notes: false
